<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/variables.css" />
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="../../css/pages.css" />
  <link rel="stylesheet" href="../../css/responsive.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="App.toggleSidebar()"></div>
    <div class="main-area">
      <header class="topbar" id="topbar"></header>
      <main class="page-content">
        <div class="page-header">
          <h1>Dashboard Admin</h1>
          <p>Ringkasan keseluruhan laporan kerusakan fasilitas umum.</p>
        </div>

        <div class="stat-grid" id="statGrid"></div>

        <div class="dashboard-grid">
          <div class="card">
            <div class="card-header"><h3>📊 Laporan per Kategori</h3></div>
            <div class="card-body chart-container"><canvas id="chartKategori"></canvas></div>
          </div>
          <div class="card">
            <div class="card-header"><h3>📈 Laporan per Status</h3></div>
            <div class="card-body chart-container"><canvas id="chartStatus"></canvas></div>
          </div>
        </div>

        <div class="card" style="margin-top:24px;">
          <div class="card-header"><h3>🕐 Laporan Terbaru Masuk</h3></div>
          <div class="card-body" id="recentAll"></div>
        </div>
      </main>
    </div>
  </div>

  <script src="../../js/db.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!App.init('Dashboard', ['admin'])) return;

      const reports = DB.getAll('reports');
      const users = DB.getAll('users');
      const count = statuses => reports.filter(report => statuses.includes(report.status)).length;

      document.getElementById('statGrid').innerHTML = `
        <div class="stat-card"><div class="stat-icon primary">📋</div><div class="stat-info"><h3>${reports.length}</h3><p>Total Laporan</p></div></div>
        <div class="stat-card"><div class="stat-icon info">📩</div><div class="stat-info"><h3>${count(['diajukan', 'menunggu_verifikasi'])}</h3><p>Menunggu Verifikasi</p></div></div>
        <div class="stat-card"><div class="stat-icon warning">📤</div><div class="stat-info"><h3>${count(['terverifikasi'])}</h3><p>Siap Disposisi</p></div></div>
        <div class="stat-card"><div class="stat-icon violet">🔧</div><div class="stat-info"><h3>${count(['didisposisikan', 'menunggu_diproses', 'dalam_perbaikan', 'status_diperbarui', 'bukti_diunggah'])}</h3><p>Sedang Ditangani</p></div></div>
        <div class="stat-card"><div class="stat-icon success">✅</div><div class="stat-info"><h3>${count(['selesai'])}</h3><p>Selesai</p></div></div>
        <div class="stat-card"><div class="stat-icon violet">👥</div><div class="stat-info"><h3>${users.length}</h3><p>Total Pengguna</p></div></div>
      `;

      drawBarChart('chartKategori', getKategoriData(reports));
      drawBarChart('chartStatus', getStatusData(reports));
      renderRecent(reports);
    });

    function renderRecent(reports) {
      const sorted = [...reports].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 8);
      const body = document.getElementById('recentAll');

      if (sorted.length === 0) {
        body.innerHTML = `<div class="empty-state"><div class="icon">📭</div><h3>Belum Ada Laporan</h3></div>`;
        return;
      }

      body.innerHTML = `
        <table class="data-table">
          <thead><tr><th>Judul</th><th>Pelapor</th><th>Kategori</th><th>Status</th><th>Tanggal</th></tr></thead>
          <tbody>
            ${sorted.map(report => `
              <tr>
                <td><strong>${Utils.escapeHtml(Utils.truncate(Utils.getReportTitle(report), 32))}</strong></td>
                <td>${Utils.getUserName(report.userId)}</td>
                <td>${Utils.getCategoryIcon(report.categoryId)} ${Utils.getCategoryName(report.categoryId)}</td>
                <td>${Utils.getStatusBadge(report.status)}</td>
                <td style="color:var(--text-muted);font-size:var(--font-size-xs)">${Utils.formatDate(report.createdAt)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function getKategoriData(reports) {
      const categories = DB.getAll('categories');
      return categories.map((category, index) => ({
        label: (category.name || category.nama).length > 12 ? (category.name || category.nama).substring(0, 12) + '..' : (category.name || category.nama),
        value: reports.filter(report => report.categoryId === category.id).length,
        color: ['#818cf8', '#34d399', '#fbbf24', '#fb7185', '#22d3ee', '#a78bfa', '#38bdf8'][index % 7]
      }));
    }

    function getStatusData(reports) {
      const colors = {
        diajukan: '#38bdf8',
        menunggu_verifikasi: '#38bdf8',
        perlu_perbaikan_data: '#fbbf24',
        ditolak: '#fb7185',
        terverifikasi: '#22d3ee',
        didisposisikan: '#fbbf24',
        menunggu_diproses: '#818cf8',
        dalam_perbaikan: '#a78bfa',
        status_diperbarui: '#38bdf8',
        bukti_diunggah: '#22d3ee',
        selesai: '#34d399'
      };
      return DB.STATUSES.map(status => ({
        label: Utils.getStatusLabel(status).replace('Menunggu ', ''),
        value: reports.filter(report => report.status === status).length,
        color: colors[status] || '#818cf8'
      }));
    }

    function drawBarChart(canvasId, data) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = 280 * dpr;
      canvas.style.width = rect.width + 'px';
      canvas.style.height = '280px';
      ctx.scale(dpr, dpr);

      const w = rect.width;
      const h = 280;
      const padding = { top: 30, right: 20, bottom: 56, left: 40 };
      const chartW = w - padding.left - padding.right;
      const chartH = h - padding.top - padding.bottom;
      const maxVal = Math.max(...data.map(item => item.value), 1);
      const barW = Math.min(34, (chartW / data.length) * 0.6);
      const gap = chartW / data.length;

      ctx.clearRect(0, 0, w, h);
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const y = padding.top + (chartH / 4) * i;
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(w - padding.right, y);
        ctx.stroke();
        ctx.fillStyle = '#64748b';
        ctx.font = '11px Inter';
        ctx.textAlign = 'right';
        ctx.fillText(Math.round(maxVal - (maxVal / 4) * i), padding.left - 8, y + 4);
      }

      data.forEach((item, i) => {
        const x = padding.left + gap * i + (gap - barW) / 2;
        const barH = (item.value / maxVal) * chartH;
        const y = padding.top + chartH - barH;
        const grad = ctx.createLinearGradient(x, y, x, y + barH);
        grad.addColorStop(0, item.color);
        grad.addColorStop(1, item.color + '66');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(x, y, barW, Math.max(barH, 2), [4, 4, 0, 0]);
        ctx.fill();

        ctx.fillStyle = '#e2e8f0';
        ctx.font = 'bold 12px Inter';
        ctx.textAlign = 'center';
        ctx.fillText(item.value, x + barW / 2, y - 8);

        ctx.fillStyle = '#94a3b8';
        ctx.font = '10px Inter';
        ctx.save();
        ctx.translate(x + barW / 2, h - padding.bottom + 16);
        ctx.rotate(-0.45);
        ctx.fillText(item.label, 0, 0);
        ctx.restore();
      });
    }
  </script>
</body>
</html>
