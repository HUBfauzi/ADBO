<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/variables.css" />
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="../../css/pages.css" />
  <link rel="stylesheet" href="../../css/responsive.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="App.toggleSidebar()"></div>
    <div class="main-area">
      <header class="topbar" id="topbar"></header>
      <main class="page-content">
        <div class="page-header">
          <h1>Dashboard Admin</h1>
          <p>Ringkasan keseluruhan laporan kerusakan fasilitas umum.</p>
        </div>

        <div class="stat-grid" id="statGrid"></div>

        <div class="dashboard-grid">
          <div class="card">
            <div class="card-header"><h3>📊 Laporan per Kategori</h3></div>
            <div class="card-body chart-container"><canvas id="chartKategori"></canvas></div>
          </div>
          <div class="card">
            <div class="card-header"><h3>📈 Laporan per Status</h3></div>
            <div class="card-body chart-container"><canvas id="chartStatus"></canvas></div>
          </div>
        </div>

        <div class="card" style="margin-top:24px;">
          <div class="card-header"><h3>🕐 Laporan Terbaru Masuk</h3></div>
          <div class="card-body" id="recentAll"></div>
        </div>
      </main>
    </div>
  </div>

  <script src="../../js/db.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!App.init('Dashboard', ['admin'])) return;
      const laporan = DB.getAll('laporan');
      const users = DB.getAll('users');

      // Stats
      document.getElementById('statGrid').innerHTML = `
        <div class="stat-card"><div class="stat-icon primary">📋</div><div class="stat-info"><h3>${laporan.length}</h3><p>Total Laporan</p></div></div>
        <div class="stat-card"><div class="stat-icon info">📩</div><div class="stat-info"><h3>${laporan.filter(l=>l.status==='terkirim').length}</h3><p>Menunggu Verifikasi</p></div></div>
        <div class="stat-card"><div class="stat-icon warning">📤</div><div class="stat-info"><h3>${laporan.filter(l=>l.status==='diverifikasi').length}</h3><p>Siap Disposisi</p></div></div>
        <div class="stat-card"><div class="stat-icon success">✅</div><div class="stat-info"><h3>${laporan.filter(l=>l.status==='selesai').length}</h3><p>Selesai</p></div></div>
        <div class="stat-card"><div class="stat-icon danger">❌</div><div class="stat-info"><h3>${laporan.filter(l=>l.status==='ditolak').length}</h3><p>Ditolak</p></div></div>
        <div class="stat-card"><div class="stat-icon violet">👥</div><div class="stat-info"><h3>${users.length}</h3><p>Total Pengguna</p></div></div>
      `;

      // Chart: Kategori (simple bar chart using canvas)
      drawBarChart('chartKategori', getKategoriData(laporan), 'Jumlah Laporan per Kategori');

      // Chart: Status
      drawBarChart('chartStatus', getStatusData(laporan), 'Jumlah Laporan per Status');

      // Recent
      const sorted = [...laporan].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 8);
      document.getElementById('recentAll').innerHTML = `
        <table class="data-table"><thead><tr><th>Judul</th><th>Pelapor</th><th>Kategori</th><th>Status</th><th>Tanggal</th></tr></thead><tbody>
        ${sorted.map(l => `<tr>
          <td><strong>${Utils.escapeHtml(Utils.truncate(l.judul, 30))}</strong></td>
          <td>${Utils.getUserName(l.userId)}</td>
          <td>${Utils.getCategoryIcon(l.kategoriId)} ${Utils.getCategoryName(l.kategoriId)}</td>
          <td>${Utils.getStatusBadge(l.status)}</td>
          <td style="color:var(--text-muted);font-size:var(--font-size-xs)">${Utils.formatDate(l.createdAt)}</td>
        </tr>`).join('')}
        </tbody></table>
      `;
    });

    function getKategoriData(laporan) {
      const kategori = DB.getAll('kategori');
      return kategori.map(k => ({
        label: k.nama.length > 12 ? k.nama.substring(0, 12) + '..' : k.nama,
        value: laporan.filter(l => l.kategoriId === k.id).length,
        color: ['#818cf8','#34d399','#fbbf24','#fb7185','#22d3ee','#a78bfa','#38bdf8'][kategori.indexOf(k) % 7]
      }));
    }

    function getStatusData(laporan) {
      const statuses = [
        { key: 'terkirim', label: 'Terkirim', color: '#38bdf8' },
        { key: 'diverifikasi', label: 'Diverifikasi', color: '#22d3ee' },
        { key: 'didisposisi', label: 'Didisposisi', color: '#fbbf24' },
        { key: 'dalam_pengerjaan', label: 'Pengerjaan', color: '#a78bfa' },
        { key: 'selesai', label: 'Selesai', color: '#34d399' },
        { key: 'ditolak', label: 'Ditolak', color: '#fb7185' },
      ];
      return statuses.map(s => ({
        label: s.label,
        value: laporan.filter(l => l.status === s.key).length,
        color: s.color
      }));
    }

    function drawBarChart(canvasId, data, title) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = 280 * dpr;
      canvas.style.width = rect.width + 'px';
      canvas.style.height = '280px';
      ctx.scale(dpr, dpr);

      const w = rect.width, h = 280;
      const padding = { top: 30, right: 20, bottom: 50, left: 40 };
      const chartW = w - padding.left - padding.right;
      const chartH = h - padding.top - padding.bottom;
      const maxVal = Math.max(...data.map(d => d.value), 1);
      const barW = Math.min(40, (chartW / data.length) * 0.6);
      const gap = chartW / data.length;

      // Grid lines
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const y = padding.top + (chartH / 4) * i;
        ctx.beginPath(); ctx.moveTo(padding.left, y); ctx.lineTo(w - padding.right, y); ctx.stroke();
        ctx.fillStyle = '#64748b'; ctx.font = '11px Inter'; ctx.textAlign = 'right';
        ctx.fillText(Math.round(maxVal - (maxVal / 4) * i), padding.left - 8, y + 4);
      }

      // Bars
      data.forEach((d, i) => {
        const x = padding.left + gap * i + (gap - barW) / 2;
        const barH = (d.value / maxVal) * chartH;
        const y = padding.top + chartH - barH;

        // Bar gradient
        const grad = ctx.createLinearGradient(x, y, x, y + barH);
        grad.addColorStop(0, d.color);
        grad.addColorStop(1, d.color + '66');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(x, y, barW, barH, [4, 4, 0, 0]);
        ctx.fill();

        // Value on top
        ctx.fillStyle = '#e2e8f0'; ctx.font = 'bold 12px Inter'; ctx.textAlign = 'center';
        ctx.fillText(d.value, x + barW / 2, y - 8);

        // Label
        ctx.fillStyle = '#94a3b8'; ctx.font = '10px Inter';
        ctx.save();
        ctx.translate(x + barW / 2, h - padding.bottom + 14);
        ctx.rotate(-0.4);
        ctx.fillText(d.label, 0, 0);
        ctx.restore();
      });
    }
  </script>
</body>
</html>
