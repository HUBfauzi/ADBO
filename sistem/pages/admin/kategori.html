<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kategori Kerusakan — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/variables.css" />
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="../../css/pages.css" />
  <link rel="stylesheet" href="../../css/responsive.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="App.toggleSidebar()"></div>
    <div class="main-area">
      <header class="topbar" id="topbar"></header>
      <main class="page-content">
        <div class="page-header">
          <h1>🏷️ Kelola Kategori Kerusakan</h1>
          <p>Tambah, edit, dan hapus kategori jenis kerusakan fasilitas.</p>
        </div>

        <div class="toolbar">
          <div></div>
          <button class="btn btn-primary btn-sm" onclick="openAdd()">+ Tambah Kategori</button>
        </div>

        <div class="table-wrapper">
          <table class="data-table">
            <thead><tr><th>No</th><th>Icon</th><th>Nama Kategori</th><th>Deskripsi</th><th>Jumlah Laporan</th><th>Aksi</th></tr></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>

        <!-- Modal -->
        <div class="modal-overlay" id="kategoriModal">
          <div class="modal">
            <div class="modal-header">
              <h2 id="modalTitle">Tambah Kategori</h2>
              <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
              <div class="form-group">
                <label class="form-label">Nama Kategori *</label>
                <input type="text" id="katNama" class="form-input" placeholder="Contoh: Jalan Berlubang" required />
              </div>
              <div class="form-group">
                <label class="form-label">Icon (Emoji)</label>
                <input type="text" id="katIcon" class="form-input" placeholder="Contoh: 🛣️" maxlength="4" />
              </div>
              <div class="form-group">
                <label class="form-label">Deskripsi</label>
                <textarea id="katDesc" class="form-textarea" placeholder="Deskripsi singkat kategori..." rows="2"></textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-outline" onclick="closeModal()">Batal</button>
              <button class="btn btn-primary" id="saveBtn" onclick="saveKategori()">Simpan</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../../js/db.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    let editId = null;

    document.addEventListener('DOMContentLoaded', () => {
      if (!App.init('Kategori Kerusakan', ['admin'])) return;
      loadTable();
    });

    function loadTable() {
      const kategori = DB.getAll('kategori');
      const laporan = DB.getAll('laporan');
      document.getElementById('tableBody').innerHTML = kategori.map((k, i) => `
        <tr>
          <td>${i + 1}</td>
          <td style="font-size:24px;">${k.icon || '📋'}</td>
          <td><strong>${Utils.escapeHtml(k.nama)}</strong></td>
          <td style="color:var(--text-muted)">${Utils.escapeHtml(Utils.truncate(k.deskripsi, 40))}</td>
          <td><span class="badge badge-terkirim">${laporan.filter(l => l.kategoriId === k.id).length} laporan</span></td>
          <td>
            <div class="action-btns">
              <button class="action-btn edit" onclick="openEdit('${k.id}')">✏️</button>
              <button class="action-btn delete" onclick="deleteKat('${k.id}')">🗑️</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function openAdd() {
      editId = null;
      document.getElementById('modalTitle').textContent = 'Tambah Kategori';
      document.getElementById('katNama').value = '';
      document.getElementById('katIcon').value = '';
      document.getElementById('katDesc').value = '';
      document.getElementById('kategoriModal').classList.add('show');
    }

    function openEdit(id) {
      editId = id;
      const k = DB.getById('kategori', id);
      document.getElementById('modalTitle').textContent = 'Edit Kategori';
      document.getElementById('katNama').value = k.nama;
      document.getElementById('katIcon').value = k.icon || '';
      document.getElementById('katDesc').value = k.deskripsi || '';
      document.getElementById('kategoriModal').classList.add('show');
    }

    function saveKategori() {
      const nama = document.getElementById('katNama').value.trim();
      if (!nama) { Utils.showToast('Nama kategori wajib diisi.', 'error'); return; }
      const data = {
        nama: nama,
        icon: document.getElementById('katIcon').value.trim() || '📋',
        deskripsi: document.getElementById('katDesc').value.trim()
      };
      if (editId) {
        DB.update('kategori', editId, data);
        Utils.showToast('Kategori berhasil diperbarui.', 'success');
      } else {
        DB.insert('kategori', data);
        Utils.showToast('Kategori berhasil ditambahkan.', 'success');
      }
      closeModal();
      loadTable();
    }

    function deleteKat(id) {
      if (confirm('Yakin ingin menghapus kategori ini?')) {
        DB.delete('kategori', id);
        loadTable();
        Utils.showToast('Kategori dihapus.', 'warning');
      }
    }

    function closeModal() { document.getElementById('kategoriModal').classList.remove('show'); }
    document.getElementById('kategoriModal').addEventListener('click', e => { if (e.target.classList.contains('modal-overlay')) closeModal(); });
  </script>
</body>
</html>
