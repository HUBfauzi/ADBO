<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kategori Kerusakan — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/variables.css" />
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="../../css/pages.css" />
  <link rel="stylesheet" href="../../css/responsive.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="App.toggleSidebar()"></div>
    <div class="main-area">
      <header class="topbar" id="topbar"></header>
      <main class="page-content">
        <div class="page-header">
          <h1>🏷️ Kelola Kategori Kerusakan</h1>
          <p>Tambah, edit, dan hapus kategori jenis kerusakan fasilitas.</p>
        </div>

        <div class="toolbar">
          <div></div>
          <button class="btn btn-primary btn-sm" onclick="openAdd()">+ Tambah Kategori</button>
        </div>

        <div class="table-wrapper">
          <table class="data-table">
            <thead><tr><th>No</th><th>Icon</th><th>Nama Kategori</th><th>Deskripsi</th><th>Jumlah Laporan</th><th>Aksi</th></tr></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>

        <div class="modal-overlay" id="kategoriModal">
          <div class="modal">
            <div class="modal-header">
              <h2 id="modalTitle">Tambah Kategori</h2>
              <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
              <div class="form-group">
                <label class="form-label">Nama Kategori *</label>
                <input type="text" id="katNama" class="form-input" placeholder="Contoh: Jalan Berlubang" required />
              </div>
              <div class="form-group">
                <label class="form-label">Icon (Emoji)</label>
                <input type="text" id="katIcon" class="form-input" placeholder="Contoh: 🛣️" maxlength="4" />
              </div>
              <div class="form-group">
                <label class="form-label">Deskripsi</label>
                <textarea id="katDesc" class="form-textarea" placeholder="Deskripsi singkat kategori..." rows="2"></textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-outline" onclick="closeModal()">Batal</button>
              <button class="btn btn-primary" id="saveBtn" onclick="saveKategori()">Simpan</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../../js/db.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    let editId = null;

    document.addEventListener('DOMContentLoaded', () => {
      if (!App.init('Kategori Kerusakan', ['admin'])) return;
      loadTable();
    });

    function loadTable() {
      const categories = DB.getAll('categories');
      const reports = DB.getAll('reports');
      const tbody = document.getElementById('tableBody');

      if (categories.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="icon">🏷️</div><h3>Belum Ada Kategori</h3></div></td></tr>`;
        return;
      }

      tbody.innerHTML = categories.map((category, i) => {
        const count = reports.filter(report => report.categoryId === category.id).length;
        return `
          <tr>
            <td>${i + 1}</td>
            <td style="font-size:24px;">${category.icon || '📋'}</td>
            <td><strong>${Utils.escapeHtml(category.name || category.nama)}</strong></td>
            <td style="color:var(--text-muted)">${Utils.escapeHtml(Utils.truncate(category.description || category.deskripsi, 44))}</td>
            <td><span class="badge badge-menunggu-verifikasi">${count} laporan</span></td>
            <td>
              <div class="action-btns">
                <button class="action-btn edit" title="Edit" onclick="openEdit('${category.id}')">✏️</button>
                <button class="action-btn delete" title="Hapus" onclick="deleteKategori('${category.id}')">🗑️</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    function openAdd() {
      editId = null;
      document.getElementById('modalTitle').textContent = 'Tambah Kategori';
      document.getElementById('katNama').value = '';
      document.getElementById('katIcon').value = '';
      document.getElementById('katDesc').value = '';
      document.getElementById('kategoriModal').classList.add('show');
    }

    function openEdit(id) {
      editId = id;
      const category = DB.getById('categories', id);
      document.getElementById('modalTitle').textContent = 'Edit Kategori';
      document.getElementById('katNama').value = category.name || category.nama;
      document.getElementById('katIcon').value = category.icon || '';
      document.getElementById('katDesc').value = category.description || category.deskripsi || '';
      document.getElementById('kategoriModal').classList.add('show');
    }

    function saveKategori() {
      const name = document.getElementById('katNama').value.trim();
      if (!name) {
        Utils.showToast('Nama kategori wajib diisi.', 'error');
        return;
      }

      const data = {
        name,
        nama: name,
        icon: document.getElementById('katIcon').value.trim() || '📋',
        description: document.getElementById('katDesc').value.trim(),
        deskripsi: document.getElementById('katDesc').value.trim()
      };

      if (editId) {
        DB.update('categories', editId, data);
        Utils.showToast('Kategori berhasil diperbarui.', 'success');
      } else {
        DB.insert('categories', data);
        Utils.showToast('Kategori berhasil ditambahkan.', 'success');
      }

      closeModal();
      loadTable();
    }

    function deleteKategori(id) {
      const used = DB.count('reports', report => report.categoryId === id);
      const message = used > 0
        ? `Kategori ini dipakai oleh ${used} laporan. Tetap hapus?`
        : 'Yakin ingin menghapus kategori ini?';

      if (confirm(message)) {
        DB.delete('categories', id);
        loadTable();
        Utils.showToast('Kategori dihapus.', 'warning');
      }
    }

    function closeModal() {
      document.getElementById('kategoriModal').classList.remove('show');
    }

    document.getElementById('kategoriModal').addEventListener('click', e => {
      if (e.target.classList.contains('modal-overlay')) closeModal();
    });
  </script>
</body>
</html>
