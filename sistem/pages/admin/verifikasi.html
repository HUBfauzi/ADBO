<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verifikasi Laporan — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/variables.css" />
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="../../css/pages.css" />
  <link rel="stylesheet" href="../../css/responsive.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="App.toggleSidebar()"></div>
    <div class="main-area">
      <header class="topbar" id="topbar"></header>
      <main class="page-content">
        <div class="page-header">
          <h1>✅ Verifikasi Laporan</h1>
          <p>Periksa laporan masuk, lalu tandai sebagai terverifikasi, perlu perbaikan data, atau ditolak.</p>
        </div>

        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr><th>No</th><th>Judul</th><th>Pelapor</th><th>Kategori</th><th>Status</th><th>Tanggal</th><th>Aksi</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>

        <div class="modal-overlay" id="verifyModal">
          <div class="modal" style="max-width:680px;">
            <div class="modal-header">
              <h2>Verifikasi Laporan</h2>
              <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="verifyContent"></div>
            <div class="modal-footer" id="verifyFooter"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../../js/db.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    let currentId = null;

    document.addEventListener('DOMContentLoaded', () => {
      if (!App.init('Verifikasi Laporan', ['admin'])) return;
      loadTable();
    });

    function loadTable() {
      const pending = DB.filter('reports', report => ['diajukan', 'menunggu_verifikasi'].includes(report.status))
        .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
      const tbody = document.getElementById('tableBody');

      if (pending.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="icon">✅</div><h3>Semua Laporan Sudah Diverifikasi</h3><p>Tidak ada laporan yang menunggu verifikasi.</p></div></td></tr>`;
        return;
      }

      tbody.innerHTML = pending.map((report, i) => `
        <tr>
          <td>${i + 1}</td>
          <td><strong>${Utils.escapeHtml(Utils.truncate(Utils.getReportTitle(report), 30))}</strong></td>
          <td>${Utils.getUserName(report.userId)}</td>
          <td>${Utils.getCategoryIcon(report.categoryId)} ${Utils.getCategoryName(report.categoryId)}</td>
          <td>${Utils.getStatusBadge(report.status)}</td>
          <td style="font-size:var(--font-size-xs);color:var(--text-muted)">${Utils.formatDate(report.createdAt)}</td>
          <td>
            <div class="action-btns">
              <button class="action-btn view" title="Lihat dan verifikasi" onclick="openVerify('${report.id}')">👁️</button>
              <button class="action-btn approve" title="Verifikasi cepat" onclick="quickVerify('${report.id}')">✅</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function openVerify(id) {
      currentId = id;
      const report = DB.getById('reports', id);
      const damagePhoto = Utils.getReportPhoto(report);

      document.getElementById('verifyContent').innerHTML = `
        <div class="detail-grid">
          <div>
            <div class="detail-item"><div class="label">Judul</div><div class="value">${Utils.escapeHtml(Utils.getReportTitle(report))}</div></div>
            <div class="detail-item"><div class="label">Pelapor</div><div class="value">${Utils.getUserName(report.userId)}</div></div>
            <div class="detail-item"><div class="label">Kategori</div><div class="value">${Utils.getCategoryIcon(report.categoryId)} ${Utils.getCategoryName(report.categoryId)}</div></div>
          </div>
          <div>
            <div class="detail-item"><div class="label">Status Saat Ini</div><div class="value">${Utils.getStatusBadge(report.status)}</div></div>
            <div class="detail-item"><div class="label">Tanggal Masuk</div><div class="value">${Utils.formatDateTime(report.createdAt)}</div></div>
            <div class="detail-item"><div class="label">Lokasi</div><div class="value">${Utils.escapeHtml(Utils.getReportLocation(report))}</div></div>
          </div>
        </div>
        <div class="detail-item"><div class="label">Deskripsi</div><div class="value">${Utils.escapeHtml(Utils.getReportDescription(report))}</div></div>
        ${damagePhoto ? `<div class="detail-item"><div class="label">Foto Kerusakan</div><div class="file-preview" style="display:block"><img src="${damagePhoto}" alt="Foto kerusakan"/></div></div>` : ''}
        <div class="form-group" style="margin-top:16px;">
          <label class="form-label">Catatan Admin</label>
          <textarea id="catatanAdmin" class="form-textarea" placeholder="Tuliskan alasan verifikasi, kebutuhan perbaikan data, atau alasan penolakan..." rows="3"></textarea>
        </div>
      `;
      document.getElementById('verifyFooter').innerHTML = `
        <button class="btn btn-outline" onclick="closeModal()">Batal</button>
        <button class="btn btn-warning" onclick="needFix()">⚠️ Perlu Perbaikan Data</button>
        <button class="btn btn-danger" onclick="rejectReport()">❌ Tolak</button>
        <button class="btn btn-success" onclick="verifyReport()">✅ Terverifikasi</button>
      `;
      document.getElementById('verifyModal').classList.add('show');
    }

    function getAdminNote(defaultNote) {
      const input = document.getElementById('catatanAdmin');
      return input && input.value.trim() ? input.value.trim() : defaultNote;
    }

    function quickVerify(id) {
      DB.updateReportStatus(id, 'terverifikasi', {
        adminNote: 'Laporan valid dan siap didisposisikan.',
        statusNote: 'Admin memverifikasi laporan.'
      });
      loadTable();
      Utils.showToast('Laporan berhasil diverifikasi.', 'success');
    }

    function verifyReport() {
      DB.updateReportStatus(currentId, 'terverifikasi', {
        adminNote: getAdminNote('Laporan valid dan siap didisposisikan.'),
        statusNote: 'Admin memverifikasi laporan.'
      });
      closeModal();
      loadTable();
      Utils.showToast('Laporan berhasil diverifikasi.', 'success');
    }

    function needFix() {
      DB.updateReportStatus(currentId, 'perlu_perbaikan_data', {
        adminNote: getAdminNote('Data laporan belum lengkap. Mohon perbaiki judul, lokasi, deskripsi, atau foto.'),
        statusNote: 'Admin meminta perbaikan data laporan.'
      });
      closeModal();
      loadTable();
      Utils.showToast('Laporan dikembalikan untuk perbaikan data.', 'warning');
    }

    function rejectReport() {
      DB.updateReportStatus(currentId, 'ditolak', {
        adminNote: getAdminNote('Laporan ditolak karena tidak valid atau duplikat.'),
        statusNote: 'Admin menolak laporan.'
      });
      closeModal();
      loadTable();
      Utils.showToast('Laporan ditolak.', 'warning');
    }

    function closeModal() {
      document.getElementById('verifyModal').classList.remove('show');
    }

    document.getElementById('verifyModal').addEventListener('click', e => {
      if (e.target.classList.contains('modal-overlay')) closeModal();
    });
  </script>
</body>
</html>
