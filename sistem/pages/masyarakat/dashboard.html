<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Masyarakat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/variables.css" />
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="../../css/pages.css" />
  <link rel="stylesheet" href="../../css/responsive.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="App.toggleSidebar()"></div>
    <div class="main-area">
      <header class="topbar" id="topbar"></header>
      <main class="page-content">
        <div class="page-header">
          <h1>Dashboard</h1>
          <p>Selamat datang! Pantau laporan kerusakan fasilitas Anda di sini.</p>
        </div>

        <div class="stat-grid" id="statGrid"></div>

        <div class="dashboard-grid">
          <div class="card">
            <div class="card-header"><h3>📋 Laporan Terbaru Anda</h3></div>
            <div class="card-body" id="recentReports"></div>
          </div>
          <div class="card">
            <div class="card-header"><h3>⏱️ Aktivitas Terkini</h3></div>
            <div class="card-body" id="recentActivity"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../../js/db.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!App.init('Dashboard', ['masyarakat'])) return;

      const user = Auth.getCurrentUser();
      const myReports = DB.filter('reports', report => report.userId === user.id);
      const waitingStatuses = ['diajukan', 'menunggu_verifikasi', 'terverifikasi', 'didisposisikan', 'menunggu_diproses'];
      const workStatuses = ['dalam_perbaikan', 'status_diperbarui', 'bukti_diunggah'];

      document.getElementById('statGrid').innerHTML = `
        <div class="stat-card">
          <div class="stat-icon primary">📝</div>
          <div class="stat-info"><h3>${myReports.length}</h3><p>Total Laporan</p></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon warning">⏳</div>
          <div class="stat-info"><h3>${myReports.filter(report => waitingStatuses.includes(report.status)).length}</h3><p>Menunggu Proses</p></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon violet">🔧</div>
          <div class="stat-info"><h3>${myReports.filter(report => workStatuses.includes(report.status)).length}</h3><p>Dalam Pengerjaan</p></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon success">✅</div>
          <div class="stat-info"><h3>${myReports.filter(report => report.status === 'selesai').length}</h3><p>Selesai</p></div>
        </div>
      `;

      const sorted = [...myReports]
        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
        .slice(0, 5);

      if (sorted.length === 0) {
        document.getElementById('recentReports').innerHTML = `
          <div class="empty-state"><div class="icon">📭</div><h3>Belum Ada Laporan</h3><p>Buat laporan pertama Anda.</p></div>
        `;
      } else {
        document.getElementById('recentReports').innerHTML = `
          <table class="data-table">
            <thead><tr><th>Judul</th><th>Status</th><th>Tanggal</th></tr></thead>
            <tbody>
              ${sorted.map(report => `
                <tr>
                  <td><strong>${Utils.escapeHtml(Utils.truncate(Utils.getReportTitle(report), 35))}</strong></td>
                  <td>${Utils.getStatusBadge(report.status)}</td>
                  <td style="color:var(--text-muted);font-size:var(--font-size-xs)">${Utils.formatDate(report.createdAt)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      }

      document.getElementById('recentActivity').innerHTML = sorted.length ? `
        <ul class="activity-list">
          ${sorted.slice(0, 4).map(report => `
            <li class="activity-item">
              <div class="activity-dot" style="background:${report.status === 'selesai' ? 'var(--accent-emerald)' : 'var(--accent-primary)'}"></div>
              <div class="activity-content">
                <p><strong>${Utils.escapeHtml(Utils.truncate(Utils.getReportTitle(report), 40))}</strong> — ${Utils.getStatusLabel(report.status)}</p>
                <div class="time">${Utils.formatTimeAgo(report.updatedAt || report.createdAt)}</div>
              </div>
            </li>
          `).join('')}
        </ul>
      ` : '<div class="empty-state"><p>Belum ada aktivitas.</p></div>';
    });
  </script>
</body>
</html>
