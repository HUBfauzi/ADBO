<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buat Laporan — Lapor Fasilitas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/variables.css" />
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="../../css/pages.css" />
  <link rel="stylesheet" href="../../css/responsive.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="App.toggleSidebar()"></div>
    <div class="main-area">
      <header class="topbar" id="topbar"></header>
      <main class="page-content">
        <div class="page-header">
          <h1>📝 Buat Laporan Kerusakan</h1>
          <p>Laporkan kerusakan fasilitas umum di lingkungan Anda.</p>
        </div>

        <div class="card" style="max-width:720px;">
          <div class="card-body">
            <form id="laporanForm" onsubmit="return handleSubmit(event)">
              <div class="form-group">
                <label class="form-label" for="judul">Judul Laporan *</label>
                <input type="text" id="judul" class="form-input" placeholder="Contoh: Jalan Berlubang di Jl. Merdeka" required />
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="kategori">Kategori Kerusakan *</label>
                  <select id="kategori" class="form-select" required>
                    <option value="">— Pilih Kategori —</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label" for="lokasi">Lokasi *</label>
                  <input type="text" id="lokasi" class="form-input" placeholder="Alamat/lokasi kerusakan" required />
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="deskripsi">Deskripsi Kerusakan *</label>
                <textarea id="deskripsi" class="form-textarea" placeholder="Jelaskan kondisi kerusakan secara detail..." rows="4" required></textarea>
              </div>

              <div class="form-group">
                <label class="form-label">Upload Foto Kerusakan</label>
                <div class="file-upload" id="fileUpload" onclick="document.getElementById('fotoInput').click()">
                  <div class="icon">📷</div>
                  <p>Klik untuk memilih foto kerusakan</p>
                  <p style="font-size:11px;color:var(--text-muted);margin-top:4px;">Format: JPG, PNG (maks 2MB)</p>
                </div>
                <input type="file" id="fotoInput" accept="image/*" style="display:none" onchange="previewFoto(this)" />
                <div class="file-preview" id="fotoPreview" style="display:none;"></div>
              </div>

              <div id="formError" class="form-error" style="display:none;margin-bottom:12px;"></div>

              <div style="display:flex;gap:12px;margin-top:24px;flex-wrap:wrap;">
                <button type="submit" class="btn btn-primary btn-lg">📤 Kirim Laporan</button>
                <a href="dashboard.html" class="btn btn-outline btn-lg">Batal</a>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../../js/db.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    let fotoBase64 = null;

    document.addEventListener('DOMContentLoaded', () => {
      if (!App.init('Buat Laporan', ['masyarakat'])) return;

      const categories = DB.getAll('categories');
      const select = document.getElementById('kategori');
      categories.forEach(category => {
        const opt = document.createElement('option');
        opt.value = category.id;
        opt.textContent = `${category.icon || '📋'} ${category.name || category.nama}`;
        select.appendChild(opt);
      });
    });

    function previewFoto(input) {
      const file = input.files[0];
      if (!file) return;

      if (file.size > 2 * 1024 * 1024) {
        Utils.showToast('Ukuran file melebihi 2MB.', 'error');
        input.value = '';
        return;
      }

      const reader = new FileReader();
      reader.onload = event => {
        fotoBase64 = event.target.result;
        document.getElementById('fotoPreview').innerHTML = `<img src="${fotoBase64}" alt="Preview foto kerusakan" />`;
        document.getElementById('fotoPreview').style.display = 'block';
        document.getElementById('fileUpload').innerHTML = `<div class="icon">✅</div><p class="file-name">${Utils.escapeHtml(file.name)}</p><p style="font-size:11px;color:var(--text-muted);">Klik untuk ganti foto</p>`;
      };
      reader.readAsDataURL(file);
    }

    function handleSubmit(e) {
      e.preventDefault();
      const user = Auth.getCurrentUser();
      const now = new Date().toISOString();

      const report = DB.insert('reports', {
        userId: user.id,
        masyarakatId: user.id,
        title: document.getElementById('judul').value.trim(),
        description: document.getElementById('deskripsi').value.trim(),
        categoryId: document.getElementById('kategori').value,
        location: document.getElementById('lokasi').value.trim(),
        damagePhoto: fotoBase64,
        status: 'menunggu_verifikasi',
        petugasId: null,
        repairPhoto: null,
        adminNote: '',
        officerNote: '',
        submittedAt: now,
        createdAt: now,
        statusHistory: [
          { status: 'diajukan', at: now, by: user.id, note: 'Laporan dibuat oleh masyarakat.' },
          { status: 'menunggu_verifikasi', at: now, by: null, note: 'Laporan masuk ke sistem dan menunggu verifikasi admin.' }
        ]
      });

      Utils.showToast(`Laporan ${report.id} berhasil dikirim.`, 'success');
      setTimeout(() => {
        window.location.href = 'status-laporan.html';
      }, 900);
      return false;
    }
  </script>
</body>
</html>
