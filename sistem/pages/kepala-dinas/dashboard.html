<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Kepala Dinas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/variables.css" />
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="../../css/pages.css" />
  <link rel="stylesheet" href="../../css/responsive.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="App.toggleSidebar()"></div>
    <div class="main-area">
      <header class="topbar" id="topbar"></header>
      <main class="page-content">
        <div class="page-header">
          <h1>Dashboard Kepala Dinas</h1>
          <p>Monitoring rekap laporan dan progres penanganan fasilitas umum.</p>
        </div>

        <div class="stat-grid" id="statGrid"></div>

        <div class="dashboard-grid">
          <div class="card">
            <div class="card-header"><h3>📈 Rekap Status Laporan</h3></div>
            <div class="card-body" id="statusSummary"></div>
          </div>
          <div class="card">
            <div class="card-header"><h3>✅ Laporan Selesai Terbaru</h3></div>
            <div class="card-body" id="finishedReports"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../../js/db.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!App.init('Dashboard', ['kepala_dinas'])) return;

      const reports = DB.getAll('reports');
      const handledStatuses = ['didisposisikan', 'menunggu_diproses', 'dalam_perbaikan', 'status_diperbarui', 'bukti_diunggah'];
      const count = statuses => reports.filter(report => statuses.includes(report.status)).length;

      document.getElementById('statGrid').innerHTML = `
        <div class="stat-card"><div class="stat-icon primary">📋</div><div class="stat-info"><h3>${reports.length}</h3><p>Total Laporan</p></div></div>
        <div class="stat-card"><div class="stat-icon info">📩</div><div class="stat-info"><h3>${count(['diajukan', 'menunggu_verifikasi'])}</h3><p>Menunggu Verifikasi</p></div></div>
        <div class="stat-card"><div class="stat-icon violet">🔧</div><div class="stat-info"><h3>${count(handledStatuses)}</h3><p>Sedang Ditangani</p></div></div>
        <div class="stat-card"><div class="stat-icon success">✅</div><div class="stat-info"><h3>${count(['selesai'])}</h3><p>Selesai</p></div></div>
      `;

      document.getElementById('statusSummary').innerHTML = `
        <table class="data-table">
          <thead><tr><th>Status</th><th>Jumlah</th></tr></thead>
          <tbody>
            ${DB.STATUSES.map(status => `
              <tr>
                <td>${Utils.getStatusBadge(status)}</td>
                <td><strong>${reports.filter(report => report.status === status).length}</strong></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;

      const finished = reports
        .filter(report => report.status === 'selesai')
        .sort((a, b) => new Date(b.updatedAt || b.createdAt) - new Date(a.updatedAt || a.createdAt))
        .slice(0, 6);

      document.getElementById('finishedReports').innerHTML = finished.length ? `
        <table class="data-table">
          <thead><tr><th>Judul</th><th>Petugas</th><th>Tanggal</th></tr></thead>
          <tbody>
            ${finished.map(report => `
              <tr>
                <td><strong>${Utils.escapeHtml(Utils.truncate(Utils.getReportTitle(report), 30))}</strong></td>
                <td>${Utils.getUserName(report.petugasId)}</td>
                <td style="color:var(--text-muted);font-size:var(--font-size-xs)">${Utils.formatDate(report.updatedAt || report.createdAt)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      ` : '<div class="empty-state"><div class="icon">📭</div><h3>Belum Ada Laporan Selesai</h3></div>';
    });
  </script>
</body>
</html>
